<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0F172A" />
    <title>LogiTrack Offline</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #F8FAFC;
        color: #0F172A;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(92vw, 420px);
        padding: 32px;
        border-radius: 24px;
        background: white;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.16);
        text-align: center;
      }
      .logo {
        width: 72px;
        height: 72px;
        margin: 0 auto 18px;
        display: grid;
        place-items: center;
        border-radius: 22px;
        background: #F97316;
        color: white;
        font-size: 28px;
        font-weight: 900;
      }
      h1 { margin: 0 0 8px; font-size: 26px; }
      p { margin: 0 0 20px; color: #475569; line-height: 1.5; }
      button {
        border: 0;
        border-radius: 14px;
        padding: 13px 18px;
        background: #0F172A;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">LT</div>
      <h1>You are offline</h1>
      <p>LogiTrack will keep queued actions ready and sync them automatically when your connection returns.</p>
      <button onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
